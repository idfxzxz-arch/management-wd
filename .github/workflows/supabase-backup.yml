name: Supabase Database Backup

on:
  schedule:
    # Jalan setiap 2 hari sekali pukul 02:00 UTC / 09:00 WIB.
    - cron: "0 2 */2 * *"
  workflow_dispatch:

jobs:
  backup:
    name: Backup database
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup files
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Secret SUPABASE_DB_URL belum diisi."
            exit 1
          fi

          mkdir -p backups
          BACKUP_DATE="$(date -u +'%Y-%m-%d_%H-%M-%S')"

          pg_dump "$SUPABASE_DB_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file="backups/wd-management-${BACKUP_DATE}.dump"

          pg_dump "$SUPABASE_DB_URL" \
            --format=plain \
            --schema-only \
            --no-owner \
            --no-privileges \
            --file="backups/wd-management-schema-${BACKUP_DATE}.sql"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 30
          if-no-files-found: error
